<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Explore // PLK Sandbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0e;
      --panel-dark: rgba(18, 18, 24, 0.75);
      --neon-cyan: #00ffff;
      --neon-green: #39ff14;
      --text-light: #f5f5f7;
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--neon-green);
      text-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
      text-align: center;
      margin-bottom: 30px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 30px;
      color: var(--text-light);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 40px;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: rgba(57, 255, 20, 0.1);
      border-color: var(--neon-green);
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
      color: var(--neon-green);
      transform: translateY(-2px);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .explore-card {
      background: var(--panel-dark);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s;
    }
    .explore-card:hover {
      border-color: var(--neon-green);
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
      transform: translateY(-5px);
    }
    .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Return to Sandbox
    </a>
    <h1>// Explore Networks</h1>
    
    <div class="grid">
      <div class="explore-card">
        <div class="icon">🌐</div>
        <div class="title">DEEP WEB</div>
        <div class="desc">Encrypted proxy nodes and black market data databases.</div>
      </div>
      <div class="explore-card">
        <div class="icon">🚀</div>
        <div class="title">SATELLITES</div>
        <div class="desc">Hack into orbit grids and monitor raw transponder feeds.</div>
      </div>
    </div>
  </div>
</body>
</html>
