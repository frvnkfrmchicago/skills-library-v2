<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Stash // PLK Sandbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0e;
      --panel-dark: rgba(18, 18, 24, 0.75);
      --neon-cyan: #00ffff;
      --neon-gold: #ffb703;
      --text-light: #f5f5f7;
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--neon-gold);
      text-shadow: 0 0 15px rgba(255, 183, 3, 0.5);
      text-align: center;
      margin-bottom: 30px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 30px;
      color: var(--text-light);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 40px;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: rgba(255, 183, 3, 0.1);
      border-color: var(--neon-gold);
      box-shadow: 0 0 15px rgba(255, 183, 3, 0.3);
      color: var(--neon-gold);
      transform: translateY(-2px);
    }
    .stash-item {
      background: var(--panel-dark);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 2rem;
    }
    .details {
      flex-grow: 1;
    }
    .name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .quantity {
      font-size: 0.85rem;
      color: var(--neon-gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Return to Sandbox
    </a>
    <h1>// Secure Stash</h1>
    
    <div class="stash-item">
      <div class="icon">💾</div>
      <div class="details">
        <div class="name">ICEBREAKER KEY</div>
        <div class="desc" style="color: rgba(255,255,255,0.6); font-size: 0.85rem;">Military grade decryption code key.</div>
      </div>
      <div class="quantity">3 UNITS</div>
    </div>

    <div class="stash-item">
      <div class="icon">🌿</div>
      <div class="details">
        <div class="name">PURPLE BLUNTS</div>
        <div class="desc" style="color: rgba(255,255,255,0.6); font-size: 0.85rem;">Neon-rolled synthetic herbs.</div>
      </div>
      <div class="quantity">12 UNITS</div>
    </div>
  </div>
</body>
</html>
