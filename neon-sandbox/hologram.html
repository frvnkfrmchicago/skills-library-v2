<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Hologram Model Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-glow: #00ffff;
      --neon-glow-rgba: rgba(0, 255, 255, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #040406;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(18, 18, 26, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
      z-index: 100;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      border-color: var(--neon-glow);
      box-shadow: 0 0 15px var(--neon-glow-rgba);
    }

    /* Interactive Mockup Container */
    .mockup-wrapper {
      position: relative;
      width: 800px;
      height: 800px;
      background: #000;
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
      overflow: hidden;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .mockup-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    /* HUD Menu overlay - Positioned exactly over the right side */
    .hud-menu {
      position: absolute;
      top: 36.5%;
      left: 44.5%;
      width: 47%;
      height: 18%;
      background: rgba(8, 12, 20, 0.65);
      border-radius: 16px;
      backdrop-filter: blur(12px) saturate(180%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 10px;
      z-index: 20;
      border: 1.5px solid var(--neon-glow);
      box-shadow: 0 0 30px var(--neon-glow-rgba), inset 0 0 15px rgba(0, 255, 255, 0.08);
      transform: translateY(0);
      animation: floatSway 6s ease-in-out infinite;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    @keyframes floatSway {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-4px) rotate(0.3deg); }
    }

    .hud-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .hud-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--neon-glow);
      text-shadow: 0 0 10px var(--neon-glow);
      margin: 0;
      line-height: 1;
      transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .hud-pills-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }

    .hud-pill {
      position: relative;
      flex: 1;
      height: 75px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
      border: 1.2px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s ease-out;
    }

    .hud-pill:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--neon-glow);
      box-shadow: 0 0 12px var(--neon-glow-rgba);
      transform: translateY(-2px);
    }

    .hud-pill.active {
      border-color: var(--neon-glow);
      background: rgba(0, 255, 255, 0.04);
      box-shadow: 0 0 15px var(--neon-glow-rgba);
    }

    .hud-pill svg {
      transition: transform 0.2s;
    }

    .hud-pill:hover svg {
      transform: scale(1.1);
    }

    .hud-pill span {
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    .hud-pill.active span {
      color: #fff;
    }

    .hud-pill .active-dot {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      opacity: 0;
      background: var(--neon-glow);
      box-shadow: 0 0 8px var(--neon-glow);
      transition: opacity 0.2s, background 0.4s;
    }

    .hud-pill.active .active-dot {
      opacity: 1;
    }

    /* ----------------------------------------------------
       SCENE-SPECIFIC DYNAMIC OVERLAYS / SPRITE ANIMATIONS
       ---------------------------------------------------- */
    
    .scene-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .scene-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* 1. Original Hologram Projection Rays */
    .holo-projection-container {
      position: absolute;
      left: 45%;
      top: 48%;
      width: 200px;
      height: 100px;
      display: flex;
      justify-content: center;
    }

    .holo-ray {
      position: absolute;
      bottom: 0;
      width: 2px;
      height: 160px;
      background: linear-gradient(to top, rgba(175, 120, 220, 0), rgba(175, 120, 220, 0.8), rgba(0, 255, 255, 0));
      animation: riseRay 3s infinite linear;
      opacity: 0;
    }

    .holo-ray:nth-child(2) { left: 40px; animation-delay: 0.5s; height: 180px; }
    .holo-ray:nth-child(3) { left: -40px; animation-delay: 1.2s; height: 140px; }
    .holo-ray:nth-child(4) { left: 80px; animation-delay: 2s; height: 200px; }

    @keyframes riseRay {
      0% { transform: translateY(30px) scaleY(0.1); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.5; }
      100% { transform: translateY(-120px) scaleY(1.2); opacity: 0; }
    }

    .holo-ring {
      position: absolute;
      bottom: 20px;
      width: 60px;
      height: 20px;
      border: 1.5px solid rgba(0, 255, 255, 0.4);
      border-radius: 50%;
      transform: rotateX(75deg);
      animation: riseRing 4s infinite ease-out;
      opacity: 0;
    }
    .holo-ring:nth-child(6) { animation-delay: 2s; width: 90px; }

    @keyframes riseRing {
      0% { transform: translateY(20px) rotateX(75deg) scale(0.5); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% { transform: translateY(-140px) rotateX(75deg) scale(1.5); opacity: 0; }
    }

    /* 2. Waterfall Smoke Action Sticker */
    .waterfall-smoke-tip {
      position: absolute;
      left: 54.8%;
      top: 43.6%;
      width: 12px;
      height: 12px;
    }

    .smoke-cherry-glow {
      width: 4px;
      height: 4px;
      background: #ff5500;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff3300, 0 0 20px #ff3300;
      animation: pulseCherry 1.5s infinite alternate;
    }

    @keyframes pulseCherry {
      0% { transform: scale(0.8); filter: brightness(1); }
      100% { transform: scale(1.2); filter: brightness(1.5); }
    }

    .purple-smoke-sticker {
      position: absolute;
      top: -65px;
      left: -20px;
      width: 60px;
      height: 80px;
      background-image: url('assets/stickers/neon/neon_chill_cloud.gif');
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0.75;
      filter: drop-shadow(0 0 8px rgba(175, 120, 220, 0.8)) hue-rotate(270deg);
      animation: driftSmoke 8s infinite ease-in-out;
    }

    @keyframes driftSmoke {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
      50% { transform: translate(12px, -15px) scale(1.2); opacity: 0.9; }
    }

    /* 3. Pixel Forest Coffee Steam & Laptop Glow */
    .forest-mug-steam {
      position: absolute;
      left: 36.3%;
      top: 64%;
      width: 30px;
      height: 50px;
      background-image: url('assets/stickers/pixel/pixel_coffee_steam.gif');
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0.65;
    }

    .forest-laptop-screen {
      position: absolute;
      left: 56.5%;
      top: 71.5%;
      width: 53px;
      height: 38px;
      background: rgba(0, 255, 136, 0.15);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
      border-radius: 2px;
      animation: pulseScreen 2s infinite alternate;
      transform: perspective(100px) rotateY(-10deg) rotateX(10deg);
    }

    @keyframes pulseScreen {
      0% { opacity: 0.3; }
      100% { opacity: 0.8; }
    }

    /* 4. Beach Glowing Radar Orb */
    .beach-orb-container {
      position: absolute;
      left: 42%;
      top: 61%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glowing-orb {
      width: 14px;
      height: 14px;
      background: #00ffff;
      border-radius: 50%;
      box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
      animation: floatOrb 2.5s infinite ease-in-out;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translateY(0) scale(0.9); }
      50% { transform: translateY(-6px) scale(1.1); }
    }

    .radar-ring {
      position: absolute;
      width: 14px;
      height: 14px;
      border: 1.5px solid #00ffff;
      border-radius: 50%;
      animation: pulseRadar 3s infinite linear;
      opacity: 0;
    }
    .radar-ring:nth-child(2) { animation-delay: 1s; }
    .radar-ring:nth-child(3) { animation-delay: 2s; }

    @keyframes pulseRadar {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    /* Scene Selector Navigation at the Bottom */
    .scene-selector-container {
      margin-top: 25px;
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(18, 18, 26, 0.8);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
    }

    .scene-btn {
      padding: 10px 20px;
      border-radius: 30px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .scene-btn:hover {
      border-color: var(--neon-glow);
      color: #fff;
      box-shadow: 0 0 10px var(--neon-glow-rgba);
    }

    .scene-btn.active {
      background: var(--neon-glow);
      border-color: var(--neon-glow);
      color: #000;
      box-shadow: 0 0 18px var(--neon-glow-rgba);
      font-weight: 900;
    }
  </style>
</head>
<body>

  <!-- Back button -->
  <a href="index.html" class="back-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Return to Sandbox
  </a>

  <!-- Mockup frame -->
  <div class="mockup-wrapper" id="mockup-frame">
    <img src="assets/stickers/cyberpunk/cyberpunk_hologram.gif" alt="Cyberpunk Mockup" class="mockup-img" id="bg-image">
    
    <!-- ----------------------------------------------------
         SCENE ANIMATIONS / STICKER OVERLAYS
         ---------------------------------------------------- -->

    <!-- Overlay 1: Original Projection -->
    <div class="scene-overlay active" id="overlay-original">
      <div class="holo-projection-container">
        <div class="holo-ray"></div>
        <div class="holo-ray"></div>
        <div class="holo-ray"></div>
        <div class="holo-ray"></div>
        <div class="holo-ring"></div>
        <div class="holo-ring"></div>
      </div>
    </div>

    <!-- Overlay 2: Neon Waterfall blunt cherry and smoke cloud sticker -->
    <div class="scene-overlay" id="overlay-waterfall">
      <div class="waterfall-smoke-tip">
        <div class="smoke-cherry-glow"></div>
        <div class="purple-smoke-sticker"></div>
      </div>
    </div>

    <!-- Overlay 3: Pixel Forest coffee steam and laptop glow -->
    <div class="scene-overlay" id="overlay-forest">
      <div class="forest-mug-steam"></div>
      <div class="forest-laptop-screen"></div>
    </div>

    <!-- Overlay 4: Beach glowing telepathic orb -->
    <div class="scene-overlay" id="overlay-beach">
      <div class="beach-orb-container">
        <div class="glowing-orb"></div>
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
      </div>
    </div>

    <!-- Custom Glass HUD Menu Overlay -->
    <div class="hud-menu" id="interactive-hud">
      <div class="hud-header">
        <svg id="hud-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#00ffff" stroke-width="2" style="filter: drop-shadow(0 0 3px #00ffff); transition: stroke 0.4s;">
          <path d="M12 2v20M12 12c-2-2-5-1-6 2 2-1 4-1 6-2M12 12c2-2 5-1 6 2-2-1-4-1-6-2M12 12c-2 0-4-3-3-6 1 2 2 4 3 6M12 12c2 0 4-3 3-6-1 2-2 4-3 6M12 12c-2 2-4 3-5 5 1-1 3-3 5-5M12 12c2 2 4 3 5 5-1-1-3-3-5-5" stroke-linecap="round"/>
        </svg>
        <span class="hud-title">FEED</span>
      </div>
      
      <div class="hud-pills-container">
        <div class="hud-pill active" onclick="navigate('feed')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="14" x2="7.01" y2="14"/><line x1="11" y1="14" x2="15" y2="14"/></svg>
          <span>For You</span>
          <div class="active-dot"></div>
        </div>
        <div class="hud-pill" onclick="navigate('tv')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
          <span>TV</span>
          <div class="active-dot"></div>
        </div>
        <div class="hud-pill" onclick="navigate('explore')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
          <span>Explore</span>
          <div class="active-dot"></div>
        </div>
        <div class="hud-pill" onclick="navigate('stash')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <span>Stash</span>
          <div class="active-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scene Selector Keyboard -->
  <div class="scene-selector-container">
    <button class="scene-btn active" onclick="selectScene('original', this)" data-glow="#af78dc">Motherboard Space</button>
    <button class="scene-btn" onclick="selectScene('waterfall', this)" data-glow="#00ffff">Neon Waterfall</button>
    <button class="scene-btn" onclick="selectScene('forest', this)" data-glow="#00ff88">Pixel Forest</button>
    <button class="scene-btn" onclick="selectScene('beach', this)" data-glow="#ff00aa">Sunset Beach</button>
  </div>

  <script>
    // Scene assets mapping
    const scenes = {
      original: 'assets/stickers/cyberpunk/cyberpunk_hologram.gif',
      waterfall: 'assets/stickers/cyberpunk/cyberpunk_hologram_waterfall.gif',
      forest: 'assets/stickers/cyberpunk/pixel_cyberpunk_nature.gif',
      beach: 'assets/stickers/cyberpunk/pixel_sunset_beach.gif'
    };

    function selectScene(key, btnElement) {
      // Update background image
      const bgImg = document.getElementById('bg-image');
      bgImg.style.opacity = '0.3';
      setTimeout(() => {
        bgImg.src = scenes[key];
        bgImg.style.opacity = '1';
      }, 150);

      // Reset button classes
      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');

      // Toggle active overlay sprites
      document.querySelectorAll('.scene-overlay').forEach(overlay => overlay.classList.remove('active'));
      document.getElementById('overlay-' + key).classList.add('active');

      // Update active theme glow colors dynamically
      const glowColor = btnElement.getAttribute('data-glow');
      const glowColorRgba = glowColor.replace(')', ', 0.4)').replace('rgb', 'rgba').replace('#', 'rgba('); // Quick conversion helper
      
      // Update CSS variables
      document.documentElement.style.setProperty('--neon-glow', glowColor);
      
      // Hex to RGBA convert mapping helper
      let rgbaVal = 'rgba(0, 255, 255, 0.4)';
      if (key === 'original') rgbaVal = 'rgba(175, 120, 220, 0.4)';
      else if (key === 'waterfall') rgbaVal = 'rgba(0, 255, 255, 0.4)';
      else if (key === 'forest') rgbaVal = 'rgba(0, 255, 136, 0.4)';
      else if (key === 'beach') rgbaVal = 'rgba(255, 0, 170, 0.4)';
      
      document.documentElement.style.setProperty('--neon-glow-rgba', rgbaVal);
      
      // Adjust SVG logos stroke color
      const logoSvg = document.getElementById('hud-logo');
      logoSvg.setAttribute('stroke', glowColor);
      logoSvg.style.filter = `drop-shadow(0 0 3px ${glowColor})`;
    }

    function navigate(target) {
      window.location.href = target + '.html';
    }
  </script>
</body>
</html>
