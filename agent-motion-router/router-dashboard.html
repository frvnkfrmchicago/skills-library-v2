<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent capability Discovery Router & Notes Workspace</title>
  <meta name="description" content="A collaborative registry and router hub for human and AI agents to discover, document, and route motion assets and interactive capabilities.">
  <link rel="stylesheet" href="router-style.css">
  <link rel="stylesheet" href="future-assets.css">
</head>
<body>

  <!-- Global SVG definitions -->
  <svg style="width:0; height:0; position:absolute;" aria-hidden="true">
    <defs>
      <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FC8019" />
        <stop offset="100%" stop-color="#E11C54" />
      </linearGradient>
    </defs>
  </svg>

  <div class="hub-grid">
    
    <!-- 1. Sidebar Category Filters Nav -->
    <aside class="sidebar-nav" aria-label="Discovery Categories">
      <div class="logo-section">
        <svg class="logo-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">AgenticHub</span>
      </div>

      <nav aria-label="Sidebar Menu Links">
        <ul class="nav-menu">
          <li class="nav-item active" data-category="all">
            <button type="button" id="btn-router-all">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              All Assets
            </button>
          </li>
          <li class="nav-item" data-category="animations">
            <button type="button" id="btn-router-anim">
              <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              Animations
            </button>
          </li>
          <li class="nav-item" data-category="inputs">
            <button type="button" id="btn-router-input">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Inputs & Forms
            </button>
          </li>
          <li class="nav-item" data-category="interactions">
            <button type="button" id="btn-router-inter">
              <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
              Interactions
            </button>
          </li>
          <li class="nav-item" data-category="future">
            <button type="button" id="btn-router-fut">
              <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Futuristic 2026
            </button>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- 2. Central Capability Discovery Area -->
    <main class="discovery-space" id="main-discovery-area">
      <header class="title-header">
        <h1>Agent Capability Discovery</h1>
        <p>A collaborative engine to discover UI/UX assets, write implementation notes, and map visual routes.</p>
      </header>

      <!-- Grid wrapper dynamically populated by router-registry.js -->
      <section class="capability-grid" id="capabilities-view-grid" aria-label="Visual Components List">
        <!-- Rendered dynamically by javascript -->
      </section>
    </main>

    <!-- 3. Right Control Sidebar (Collaborative Notes + Route simulator) -->
    <aside class="control-center-panel" aria-label="Agent Router Control Panel">
      
      <!-- Panel Header -->
      <div class="panel-title">
        <h2>Control Center</h2>
        <p>Human-Agent visual mapping and documentations.</p>
      </div>

      <!-- Section A: Route Binders Simulator -->
      <section class="control-section" aria-labelledby="title-route-binder">
        <h3 class="section-title" id="title-route-binder">
          <svg viewBox="0 0 24 24"><path d="M9 17a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM19 7a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM9 7l6 10"/></svg>
          Interactive Route Mapper
        </h3>
        
        <div class="router-row">
          <label for="route-cap-select">Target Capability</label>
          <select id="route-cap-select" class="router-select">
            <!-- Populated dynamically -->
          </select>
        </div>

        <div class="router-row">
          <label for="route-target-input">App Injection Selector</label>
          <input type="text" id="route-target-input" class="router-input" placeholder="e.g. tracking-map-rider">
        </div>

        <div class="router-row">
          <label for="route-desc-input">Routing Logic / Context</label>
          <input type="text" id="route-desc-input" class="router-input" placeholder="e.g. Bind pulse indicators during rider arrivals">
        </div>

        <button class="btn-primary" type="button" id="btn-bind-route-action">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Bind Route Point
        </button>
      </section>

      <!-- Section B: Active Routes Map Indicators -->
      <section class="control-section" aria-labelledby="title-active-routes">
        <h3 class="section-title" id="title-active-routes">
          <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 6v6l4 2"/></svg>
          Active Route Registry
        </h3>
        
        <div class="routes-list" id="active-routes-list-wrapper">
          <!-- Populated dynamically -->
        </div>
      </section>

      <!-- Section C: Shared Collaborative Note Workspace -->
      <section class="control-section" aria-labelledby="title-note-workspace">
        <h3 class="section-title" id="title-note-workspace">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Collaborative Agent Workspace
        </h3>

        <!-- Scrollable notes ledger -->
        <div class="notes-container" id="visual-notes-ledger">
          <!-- Populated dynamically -->
        </div>

        <!-- Add custom notes form -->
        <div class="router-row">
          <textarea id="note-workspace-text" class="note-textarea" rows="3" placeholder="AI / human agents: write responsive findings or routing notes here..."></textarea>
        </div>

        <button class="btn-primary" type="button" id="btn-add-note-action">
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          Document Workspace Finding
        </button>
      </section>

    </aside>

  </div>

  <!-- Dynamic system behavior scripts linking -->
  <script src="router-registry.js"></script>
  <script src="future-assets.js"></script>
  <script src="router-app.js"></script>
</body>
</html>
