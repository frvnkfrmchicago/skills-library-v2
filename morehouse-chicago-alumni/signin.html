<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Morehouse Chicago Alumni</title>
  <meta name="description" content="Sign in to the Chicago Area Morehouse College Alumni Association member portal.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="site-header"></div>

  <main id="main-content" class="page-enter" style="padding-top:var(--shell-offset,var(--nav-height));min-height:100vh">
    <div class="container" style="padding-top:var(--space-3xl);padding-bottom:var(--space-section)">
      <div class="signin-wrap">

        <div class="signin-card">
          <div class="signin-card__header">
            <div class="hero__eyebrow">Member Portal</div>
            <h1 class="signin-card__title">Sign In</h1>
            <p class="signin-card__sub">Access your dashboard, directory, and events.</p>
          </div>

          <!-- Reason banner — populated by JS when redirected from a protected page -->
          <div id="signin-reason" class="signin-reason" hidden aria-live="polite"></div>

          <form id="signin-form" class="signin-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="signin-email">Email address</label>
              <input
                class="form-input"
                type="email"
                id="signin-email"
                name="email"
                autocomplete="email"
                required
                placeholder="your.email@example.com"
              >
            </div>

            <div class="form-group">
              <label class="form-label" for="signin-password">Password</label>
              <input
                class="form-input"
                type="password"
                id="signin-password"
                name="password"
                autocomplete="current-password"
                required
              >
            </div>

            <div class="form-error" id="signin-error" hidden role="alert" aria-live="assertive"></div>

            <button type="submit" class="btn btn--gold btn--lg signin-form__submit" id="signin-btn">
              Sign In
            </button>
          </form>

          <div class="signin-card__footer">
            <p class="signin-footer-text">
              Not yet a member?
              <a href="membership.html" class="signin-footer-link">Learn about membership</a>
            </p>
            <p class="signin-footer-text">
              Need help signing in?
              <a href="index.html#contact" class="signin-footer-link">Contact the chapter</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- data-contract §2.1 load order: supabase-js UMD CDN -> config -> store -> auth -> shell -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Store.init();
      await Auth.init();

      // If already signed in, skip the form and go to the ?next= page or dashboard.
      if (Auth.isSignedIn()) {
        var params = new URLSearchParams(location.search);
        var next = params.get('next');
        window.location.href = (next && /^[a-zA-Z0-9_\-]+\.html(\?[^<>"']*)?$/.test(next))
          ? decodeURIComponent(next)
          : 'dashboard.html';
        return;
      }

      Shell.render({
        page: 'signin',
        breadcrumbs: [{ label: 'Sign In' }],
      });

      // Show a reason if a protected page sent us here
      var params = new URLSearchParams(location.search);
      var reason = params.get('reason');
      var reasonEl = document.getElementById('signin-reason');
      if (reason && reasonEl) {
        var messages = {
          'auth-required': 'Please sign in to access that page.',
          'session-expired': 'Your session expired. Please sign in again.',
        };
        var msg = messages[reason] || 'Please sign in to continue.';
        reasonEl.textContent = msg;
        reasonEl.removeAttribute('hidden');
      }

      // Focus the email field on load
      var emailField = document.getElementById('signin-email');
      if (emailField) emailField.focus();

      // Sign-in form submit
      var form = document.getElementById('signin-form');
      var btn = document.getElementById('signin-btn');
      var errEl = document.getElementById('signin-error');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.hidden = true;
        errEl.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        var email = document.getElementById('signin-email').value.trim();
        var password = document.getElementById('signin-password').value;

        var result = await Store.signIn(email, password);

        if (result && result.error) {
          errEl.textContent = result.error;
          errEl.hidden = false;
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        // Success: redirect to ?next= or dashboard
        var p2 = new URLSearchParams(location.search);
        var nextPage = p2.get('next');
        var dest = (nextPage && /^[a-zA-Z0-9_\-]+\.html(\?[^<>"']*)?$/.test(nextPage))
          ? decodeURIComponent(nextPage)
          : 'dashboard.html';

        window.location.href = dest;
      });
    });
  </script>
</body>
</html>
