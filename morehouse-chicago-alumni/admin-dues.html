<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dues Ledger | Morehouse Chicago Alumni Admin</title>
  <meta name="description" content="Board dues ledger for the Chicago Area Morehouse College Alumni Association: status, aging, mark-paid, and CSV export.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<!-- FOAC (data-contract §2.4 + §9 #2): hidden until Auth.requireAdmin() passes. -->
<body style="visibility:hidden" data-protected="true">

  <!-- Shell placeholders (Lane A) -->
  <div id="site-header"></div>

  <main id="main-content">
    <div class="admin-layout">
      <!-- Admin-specific sidebar — same structure as admin.html (built by Dues.renderSidebar) -->
      <aside class="admin-sidebar" id="admin-sidebar" aria-label="Admin navigation"></aside>

      <div class="admin-content page-enter" id="admin-content">
        <!-- Ledger rendered by js/admin-dues.js after the admin gate passes -->
        <div id="dues-container"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- Mark-Paid modal (Zelle / check / cash — payment-contract-paypal.md §5) -->
  <div id="mark-paid-modal" role="dialog" aria-modal="true" aria-labelledby="mark-paid-modal-title"
       style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:8px;padding:var(--space-2xl);max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18)">
      <h2 id="mark-paid-modal-title" style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-md)">Record Offline Payment</h2>
      <p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:var(--space-lg)">
        Record a Zelle, check, or cash payment that arrived directly at Chase.
        This writes a payment record, marks the invoice paid, and sets the member active.
      </p>

      <div id="mark-paid-error" role="alert" aria-live="polite"
           style="display:none;color:var(--color-error);background:#fff5f5;border:1px solid #f5c6cb;border-radius:4px;padding:var(--space-sm) var(--space-md);margin-bottom:var(--space-md);font-size:var(--text-sm)"></div>

      <div style="margin-bottom:var(--space-md)">
        <label for="mark-paid-method" style="display:block;font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-xs)">
          Payment method <span aria-hidden="true">*</span>
        </label>
        <select id="mark-paid-method"
                style="width:100%;padding:var(--space-sm) var(--space-md);font-size:var(--text-base);border:1px solid var(--color-border);border-radius:4px;box-sizing:border-box;min-height:44px">
          <option value="">Select method</option>
          <option value="zelle">Zelle</option>
          <option value="check">Check</option>
          <option value="cash">Cash</option>
        </select>
      </div>

      <div style="margin-bottom:var(--space-md)">
        <label for="mark-paid-reference" style="display:block;font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-xs)">
          Reference <span aria-hidden="true">*</span>
          <span style="font-weight:400;color:var(--color-text-secondary)"> — check number, Zelle confirmation, or note</span>
        </label>
        <input type="text" id="mark-paid-reference" maxlength="200" autocomplete="off"
               placeholder="e.g. Check #1842 or Zelle confirmation"
               style="width:100%;padding:var(--space-sm) var(--space-md);font-size:var(--text-base);border:1px solid var(--color-border);border-radius:4px;box-sizing:border-box;min-height:44px">
      </div>

      <div style="margin-bottom:var(--space-xl)">
        <label for="mark-paid-amount" style="display:block;font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-xs)">
          Amount received (USD) <span aria-hidden="true">*</span>
        </label>
        <input type="number" id="mark-paid-amount" min="1" step="0.01" autocomplete="off"
               placeholder="75.00"
               style="width:100%;padding:var(--space-sm) var(--space-md);font-size:var(--text-base);border:1px solid var(--color-border);border-radius:4px;box-sizing:border-box;min-height:44px">
      </div>

      <div style="display:flex;gap:var(--space-md);justify-content:flex-end;flex-wrap:wrap">
        <button id="mark-paid-cancel" type="button" class="btn btn--ghost"
                style="min-height:44px;min-width:100px">Cancel</button>
        <button id="mark-paid-confirm" type="button" class="btn btn--gold"
                style="min-height:44px;min-width:140px">Record Payment</button>
      </div>
    </div>
  </div>

  <!-- data-contract §2.1 load order. admin.js included for the shared showToast(). -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/admin-dues.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Store.init();
      await Auth.init();
      await Dues.start();
    });
  </script>
</body>
</html>
